name: CI - Continuous Testing (TaskForm)

on:
  push:
    branches: [ taskform ]
  pull_request:
    branches: [ taskform ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Jalankan unit test
        run: mvn test --batch-mode

      - name: Upload laporan hasil test
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: laporan-test
          path: target/surefire-reports/
